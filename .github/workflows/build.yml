name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-26]
        build_type: [cpu, cuda, tensorrt, coreml]
        exclude:
          - os: macos-26
            build_type: cpu
          - os: macos-26
            build_type: cuda
          - os: macos-26
            build_type: tensorrt
          - os: ubuntu-24.04
            build_type: coreml
          - os: ubuntu-24.04-arm
            build_type: coreml
    steps:
      - name: checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Set up devcontainer (Linux only)
        if: runner.os == 'Linux'
        uses: ./.github/workflows/actions/devcontainer
        id: devcontainer
      - name: setup exec
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            echo 'EXEC=${{ steps.devcontainer.outputs.exec }}' >> $GITHUB_ENV
          else
            echo 'EXEC=' >> $GITHUB_ENV
          fi
      - name: Get cache keys
        id: cache_keys
        run: |
          echo "onnxruntime=$(git rev-parse HEAD:onnxruntime)" >> $GITHUB_OUTPUT
          echo "month=$(date +'%Y-%m')" >> $GITHUB_OUTPUT
      - name: Cache Homebrew downloads
        if: runner.os == 'macOS'
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-ccache-${{ runner.os }}-${{ steps.cache_keys.outputs.month }}
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-${{ matrix.os }}-${{ matrix.build_type }}-${{ steps.cache_keys.outputs.month }}-${{ steps.cache_keys.outputs.onnxruntime }}
          restore-keys: |
            ccache-${{ matrix.os }}-${{ matrix.build_type }}-${{ steps.cache_keys.outputs.month }}-
      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: .deps
          key: deps-${{ matrix.os }}-${{ steps.cache_keys.outputs.month }}-${{ steps.cache_keys.outputs.onnxruntime }}
          restore-keys: |
            deps-${{ matrix.os }}-${{ steps.cache_keys.outputs.month }}-
      - name: Install ccache (macOS only)
        if: runner.os == 'macOS'
        run: brew install ccache
      - name: Install cmake 3.x (macOS)
        if: runner.os == 'macOS'
        env:
          CMAKE_VERSION: 3.31.5
        run: |
          mkdir -p .deps
          ARCHIVE=".deps/cmake-${CMAKE_VERSION}-macos-universal.tar.gz"
          if [ ! -f "$ARCHIVE" ]; then
            curl -fsSL "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-macos-universal.tar.gz" -o "$ARCHIVE"
          fi
          tar -xz -C /tmp -f "$ARCHIVE"
          echo "/tmp/cmake-${CMAKE_VERSION}-macos-universal/CMake.app/Contents/bin" >> $GITHUB_PATH
      - name: Create swap (x86-64 cuda/tensorrt)
        if: runner.arch == 'X64' && (matrix.build_type == 'cuda' || matrix.build_type == 'tensorrt')
        run: |
          free -h && swapon --show
          sudo fallocate -l 2G /swapfile.cuda
          sudo chmod 600 /swapfile.cuda
          sudo mkswap /swapfile.cuda
          sudo swapon /swapfile.cuda
      - name: Build ORT ${{ matrix.build_type }}
        env:
          CCACHE_MAXSIZE: 512M
          MAKE_EXTRA: ${{ (matrix.build_type == 'cuda' || matrix.build_type == 'tensorrt') && 'NVCC_THREADS=1 CUDA_ARCHITECTURE=89' || '' }}
        run: |
            if [ "${{ matrix.build_type }}" = "cuda" ] || [ "${{ matrix.build_type }}" = "tensorrt" ]; then
              ${{ env.EXEC }} sudo sh -ceux 'cd /usr/local/cuda/lib64/stubs/;rm -f libcuda.so.1;ln -s libcuda.so libcuda.so.1'
            fi
            ${{ env.EXEC }} sh -ceux "mkdir -p .ccache .deps"
            ${{ env.EXEC }} sh -ceux "LD_LIBRARY_PATH=/usr/local/cuda/lib64/stubs CCACHE_DIR=\$(pwd)/.ccache CCACHE_MAXSIZE=$CCACHE_MAXSIZE make ${{ matrix.build_type }}.ort $MAKE_EXTRA"
            ${{ env.EXEC }} sh -ceux "CCACHE_DIR=\$(pwd)/.ccache ccache -s"
      - name: Build sample ${{ matrix.build_type }}
        env:
          CCACHE_MAXSIZE: 512M
          MAKE_EXTRA: ${{ (matrix.build_type == 'cuda' || matrix.build_type == 'tensorrt') && 'NVCC_THREADS=1 CUDA_ARCHITECTURE=89' || '' }}
        run: |
            ${{ env.EXEC }} sh -ceux "LD_LIBRARY_PATH=/usr/local/cuda/lib64/stubs CCACHE_DIR=\$(pwd)/.ccache CCACHE_MAXSIZE=$CCACHE_MAXSIZE make ${{ matrix.build_type }}.sample $MAKE_EXTRA"
            ${{ env.EXEC }} sh -ceux "CCACHE_DIR=\$(pwd)/.ccache ccache -s"
      - name: Build tests ${{ matrix.build_type }}
        env:
          CCACHE_MAXSIZE: 512M
          MAKE_EXTRA: ${{ (matrix.build_type == 'cuda' || matrix.build_type == 'tensorrt') && 'NVCC_THREADS=1 CUDA_ARCHITECTURE=89' || '' }}
        run: |
            ${{ env.EXEC }} sh -ceux "LD_LIBRARY_PATH=/usr/local/cuda/lib64/stubs CCACHE_DIR=\$(pwd)/.ccache CCACHE_MAXSIZE=$CCACHE_MAXSIZE make ${{ matrix.build_type }}.tests $MAKE_EXTRA"
            ${{ env.EXEC }} sh -ceux "CCACHE_DIR=\$(pwd)/.ccache ccache -s"
      - name: Detect CPU features
        if: runner.os == 'Linux'
        run: |
          grep -m1 'Model name\|CPU part' /proc/cpuinfo || true
          grep -m1 'Features' /proc/cpuinfo || true
          # Skip known upstream ORT MLAS bugs when FEAT_I8MM is present (e.g. Graviton3):
          # batched SBGEMM produces NaN; SMMLA gives wrong QDQ results.
          if grep -q 'i8mm' /proc/cpuinfo; then
            echo "GTEST_FILTER=-MathOpTest.MatMulFloatTypeInitializer_FastMath:QDQTransformerTests.MatMul_*" >> $GITHUB_ENV
          fi
      - name: Run tests ${{ matrix.build_type }}
        if: matrix.build_type != 'cuda' && matrix.build_type != 'tensorrt'
        run: |
            ${{ env.EXEC }} env GTEST_FILTER=${GTEST_FILTER} make ${{ matrix.build_type }}.test
      - name: Run ${{ matrix.build_type }}
        if: matrix.build_type != 'cuda' && matrix.build_type != 'tensorrt'
        run: |
            ${{ env.EXEC }} make ${{ matrix.build_type }}.run
      - name: Bench ${{ matrix.build_type }}
        if: matrix.build_type != 'cuda' && matrix.build_type != 'tensorrt'
        run: |
            ${{ env.EXEC }} make ${{ matrix.build_type }}.bench
